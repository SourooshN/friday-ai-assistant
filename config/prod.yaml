# Friday AI Assistant - Production Configuration

# Environment
environment: prod
debug: false
hot_reload: false

# Core System
autonomy:
  unrestricted: true
  sandbox_pipeline: true
  ops_module: enabled

# Models & AI
models:
  primary: gpt_oss  # Custom model as primary
  routing:
    code: claude_code
    quick_draft: ollama_mistral
    reasoning: gpt_oss
    long_context: gpt_oss

  ollama:
    host: localhost
    port: 11434
    models:
      - name: mistral:7b-instruct-q4
      - name: openhermes:7b-q5
      - name: codellama:13b-instruct-q4
      - name: nous-hermes:13b-q5

  gpt_oss:
    variant: 13b-lora-custom
    context: 32k
    quantization: q4

  limits:
    max_tokens: 8192
    temperature: 0.1  # More deterministic in prod
    timeout: 120

# Memory & Storage
memory:
  local:
    sqlite_path: ./data/memory/friday_prod.db
    chroma_path: ./data/memory/chroma_prod
  vector:
    collection_name: friday_prod
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
  cloud:
    enabled: true
    provider: supabase
    backup_interval: 30m
    encryption: true

# Logging
logging:
  level: INFO
  path: ./data/logs
  retention:
    detailed: 30d
    archive: 1y_encrypted
  console: false
  file: true
  format: structured
  sensitive_data_redaction: true

# Git Workflow
git:
  workflow: feature_branch_pr
  human_approval: required
  auto_commit: false
  auto_push: false

# Plugin Configuration
plugins:
  enabled:
    - os_hello
    - os_automation
    - web_automation
    - social_drafts
    - voice_interface
  disabled:
    - ops_scanner  # Requires explicit human enable
  auto_load: true
  sandbox: true

# Security
security:
  chain_of_trust: true
  crypto_checks: true
  sandbox_all: true
  volatile_secrets: true
  audit_all_actions: true

# Web & Network
web:
  automation:
    enabled: true
    headless: true
    timeout: 60
  scraping:
    rate_limit: 1.0  # Human-like pacing
    user_agent: "Friday/0.1.0"
    respect_robots_txt: true

# Voice Interface
voice:
  mode: push_to_talk
  enabled: true
  persona: jarvis_like_professional
  engines:
    tts: pyttsx3
    asr: vosk
  wake_word: false  # Push-to-talk only

# UI Configuration
ui:
  enabled: true
  host: 127.0.0.1  # Localhost only in prod
  port: 8080
  auto_open: false
  hot_reload: false
  https: true

# Resource Limits
resources:
  max_cpu_percent: 80
  max_memory_mb: 8192
  throttle_on_user_activity: true
  background_throttle: true

# Feature Flags
features:
  self_modification: true
  social_media: true
  ops_module: false  # Requires manual enable
  voice_interface: true
  web_automation: true

# Social Media
social_media:
  human_approval: true
  platforms: [twitter, reddit, linkedin, instagram, tiktok, youtube]
  draft_only: false  # Can post with approval

# Ops Module (when enabled)
ops:
  sandbox_only: true
  targets_file: security/targets.yaml
  human_approval_required: true
  tools:
    - nmap
    - scapy
    # - zap  # Disabled by default

# Self-Modification Pipeline
self_modification:
  pipeline: dev_sandbox_adversarial_human_staging_prod
  auto_apply: false  # Always require human approval in prod
  weekly_review: true

# Monitoring & Alerting
monitoring:
  enabled: true
  metrics_endpoint: true
  health_checks: true
  performance_alerts: true

# Backup & Recovery
backup:
  enabled: true
  frequency: daily
  retention: 30d
  encryption: true
  verify_integrity: true